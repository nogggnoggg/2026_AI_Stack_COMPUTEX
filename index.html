];
const layers=rawLayers.map(l=>({...l,companies:l.companies.map(([name,summary])=>({name,summary}))}));
const state={selectedLayer:'all',query:''};
const layerOverview=document.querySelector('#layerOverview'),companySections=document.querySelector('#companySections'),resultsSummary=document.querySelector('#resultsSummary'),searchInput=document.querySelector('#searchInput'),emptyState=document.querySelector('#emptyState'),clearButton=document.querySelector('#clearButton'),filterButtons=Array.from(document.querySelectorAll('[data-filter]'));
function allCompanies(){return layers.flatMap(layer=>layer.companies.map(company=>({...company,layerId:layer.id,layerTitle:layer.title,accent:layer.accent})))}
function normalize(value){return value.trim().toLowerCase()}
function getVisibleCompanies(){const query=normalize(state.query);return allCompanies().filter(company=>{const matchesLayer=state.selectedLayer==='all'||company.layerId===state.selectedLayer;const searchable=`${company.name} ${company.layerTitle} ${company.summary}`.toLowerCase();return matchesLayer&&(!query||searchable.includes(query))})}
function setLayer(layerId,shouldScroll){state.selectedLayer=layerId;render();if(shouldScroll)document.querySelector('#companyResults').scrollIntoView({behavior:'smooth',block:'start'})}
function renderOverview(){layerOverview.innerHTML=layers.map(layer=>`<button class="layer-card${state.selectedLayer===layer.id?' is-active':''}" type="button" data-layer-card="${layer.id}" style="--accent:${layer.accent}"><span><span class="layer-kicker">${layer.id}</span> <strong class="layer-title">${layer.title.replace(`${layer.id} `,'')}</strong> <span class="layer-description">${layer.description}</span></span><span class="layer-count">${layer.companies.length} 家公司</span></button>`).join('');document.querySelectorAll('[data-layer-card]').forEach(card=>card.addEventListener('click',()=>setLayer(card.dataset.layerCard,true)))}
function renderFilters(){filterButtons.forEach(button=>button.classList.toggle('is-active',button.dataset.filter===state.selectedLayer))}
function renderCompanies(){const visibleCompanies=getVisibleCompanies();const visibleByLayer=layers.map(layer=>({...layer,companies:visibleCompanies.filter(company=>company.layerId===layer.id)})).filter(layer=>layer.companies.length>0);const selectedTitle=state.selectedLayer==='all'?'全部分類':layers.find(layer=>layer.id===state.selectedLayer).title;const queryText=normalize(state.query)?`，搜尋「${state.query.trim()}」`:'';resultsSummary.textContent=`${selectedTitle}${queryText}，共 ${visibleCompanies.length} 家公司`;emptyState.classList.toggle('is-visible',visibleCompanies.length===0);companySections.innerHTML=visibleByLayer.map(layer=>`<section class="layer-section" style="--accent:${layer.accent}"><header class="section-header"><h2>${layer.title}</h2><span>${layer.companies.length} 家公司</span></header><div class="company-grid">${layer.companies.map(company=>`<article class="company-card"><h3>${company.name}</h3><span class="tag">${company.layerTitle}</span><p class="summary">${company.summary}</p></article>`).join('')}</div></section>`).join('')}
function render(){renderFilters();renderOverview();renderCompanies()}
function validateData(){const companies=allCompanies(),names=companies.map(c=>c.name),uniqueNames=new Set(names);const ok=layers.length===8&&companies.length===100&&uniqueNames.size===companies.length&&!names.includes(['右側','跨頁','邊緣'].join(''))&&companies.every(c=>c.name&&c.layerId&&c.layerTitle&&/[\u4e00-\u9fff]/.test(c.summary));console[ok?'info':'error'](ok?'資料驗證通過：8 個層級、100 家公司、無重複公司。':'資料驗證未通過');return ok}
filterButtons.forEach(button=>button.addEventListener('click',()=>setLayer(button.dataset.filter,button.dataset.filter!=='all')));
searchInput.addEventListener('input',event=>{state.query=event.target.value;render()});
clearButton.addEventListener('click',()=>{state.selectedLayer='all';state.query='';searchInput.value='';render();window.scrollTo({top:0,behavior:'smooth'})});
window.aiStackBrowser={layers,allCompanies,validateData,setLayer,getVisibleCompanies};validateData();render();
</script>
</body>
</html>
